services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sindancora_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sindancora

  postgres:
    image: postgres:16-alpine
    container_name: sindancora_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sindancora}
      POSTGRES_USER: ${DB_USERNAME:-sindancora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sindancora}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sindancora

  redis:
    image: redis:7-alpine
    container_name: sindancora_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sindancora

  minio:
    image: minio/minio:latest
    container_name: sindancora_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-sindancora}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-sindancora_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sindancora

  mailpit:
    image: axllent/mailpit:latest
    container_name: sindancora_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - sindancora

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  sindancora:
    driver: bridge
